<!DOCTYPE html>
<html>
<head>
    <title>Web Monz</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #222; padding: 20px; border-radius: 15px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
        #logBox { background: #000; color: #0f0; font-family: monospace; height: 100px; overflow-y: auto; padding: 10px; font-size: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Control Panel</h3>
        <input type="text" id="noHp" placeholder="No WA (628...)">
        <button onclick="pairing()">Get Pairing Code</button>
        <div id="code" style="color:yellow; font-size:20px;">-</div>
        <input type="text" id="target" placeholder="Target WA">
        <input type="text" id="msg" placeholder="Pesan">
        <button onclick="send()">Kirim</button>
        <div id="logBox"></div>
    </div>

    <script>
        // GANTI LINK INI SETIAP KALI JALANKAN CLOUDFLARE
        const SERVER_URL = "https://LINK-KAMU-DI-TERMUX.trycloudflare.com"; 
        
        const socket = io(SERVER_URL, { transports: ['websocket'] });

        socket.on('log', (msg) => {
            const div = document.createElement('div');
            div.textContent = "> " + msg;
            document.getElementById('logBox').appendChild(div);
        });

        async function pairing() {
            const res = await fetch(`${SERVER_URL}/pairing`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nomor: document.getElementById('noHp').value })
            });
            const data = await res.json();
            document.getElementById('code').innerText = data.code;
        }

        async function send() {
            await fetch(`${SERVER_URL}/send`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nomor: document.getElementById('target').value, pesan: document.getElementById('msg').value })
            });
            alert("Terkirim!");
        }
    </script>
</body>
</html>
