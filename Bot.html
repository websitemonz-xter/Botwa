<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Web Monz Control</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background: #0f0f0f; color: #d1d1d1; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { width: 100%; max-width: 400px; background: #1a1a1a; padding: 25px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #262626; border: none; border-radius: 10px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #logBox { margin-top: 15px; padding: 10px; background: #000; color: #0f0; height: 100px; overflow: auto; font-size: 11px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>Monz Controller</h3>
        <input type="text" id="no" placeholder="Nomor (628...)">
        <button onclick="pair()">DAPATKAN KODE</button>
        <div id="res" style="padding:10px; color:#fff;">CODE: -</div>
        <input type="text" id="target" placeholder="Target">
        <input type="text" id="pesan" placeholder="Pesan">
        <button onclick="kirim()">KIRIM PESAN</button>
        <div id="logBox">Menunggu koneksi...</div>
    </div>

    <script>
        // GANTI INI DENGAN LINK HTTPS DARI CLOUDFLARE
        const URL = "http://localhost:3000/"; 
        const socket = io(URL, { transports: ['websocket'] });

        socket.on('log', (msg) => {
            let div = document.createElement('div');
            div.textContent = "> " + msg;
            document.getElementById('logBox').appendChild(div);
        });

        async function pair() {
            let res = await fetch(URL+'/pairing', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nomor:document.getElementById('no').value})});
            let data = await res.json();
            document.getElementById('res').innerText = "CODE: " + data.code;
        }

        async function kirim() {
            await fetch(URL+'/send', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nomor:document.getElementById('target').value, pesan:document.getElementById('pesan').value})});
            alert("Terkirim!");
        }
    </script>
</body>
</html>
