<!DOCTYPE html>
<html>
<head>
    <title>Bot Control</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background: #121212; color: #ccc; font-family: monospace; padding: 10px; }
        input, button { display: block; width: 100%; margin: 5px 0; padding: 8px; background: #222; color: #fff; border: 1px solid #444; }
        #logBox { border: 1px solid #444; height: 150px; overflow: scroll; padding: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="login">
        <h3>Login</h3>
        <input type="text" id="u" placeholder="User">
        <input type="password" id="p" placeholder="Pass">
        <button onclick="auth()">MASUK</button>
    </div>

    <div id="panel" style="display:none;">
        <h3>Panel</h3>
        <input type="text" id="no" placeholder="No WA">
        <button onclick="pair()">PAIRING</button>
        <div id="res">CODE: -</div>
        <hr>
        <input type="text" id="target" placeholder="Target">
        <input type="text" id="pesan" placeholder="Pesan">
        <button onclick="kirim()">KIRIM</button>
        <div id="logBox"></div>
    </div>

    <script>
        // GANTI LINK INI SESUAI CLOUDFLARE TERBARU
        const URL = "http://localhost:3000/"; 
        const socket = io(URL);

        socket.on('log', (msg) => {
            document.getElementById('logBox').innerHTML += `<div>${msg}</div>`;
        });

        function auth() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
        }

        async function pair() {
            let n = document.getElementById('no').value;
            let r = await fetch(URL+'/pairing', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nomor:n})});
            let d = await r.json();
            document.getElementById('res').innerText = "CODE: " + d.code;
        }

        async function kirim() {
            let n = document.getElementById('target').value;
            let p = document.getElementById('pesan').value;
            await fetch(URL+'/send', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nomor:n, pesan:p})});
            alert("Terkirim");
        }
    </script>
</body>
</html>
